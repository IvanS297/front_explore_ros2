# ============================================================
#  Параметры frontier_exploration пакета
#  Файл: params.yaml
#
#  Использование:
#    ros2 run frontier_exploration frontier_exploration \
#      --ros-args --params-file /path/to/params.yaml \
#      -r /odom:=/diff_cont/odom
#
#    ros2 run frontier_exploration pure_persuit \
#      --ros-args --params-file /path/to/params.yaml \
#      -r /odom:=/diff_cont/odom \
#      -r /cmd_vel:=/diff_cont/cmd_vel
# ============================================================

frontier_exploration:
  ros__parameters:

    # ── Режим отладки ───────────────────────────────────────
    # true  → публикует /frontier_cells, /cost_map, /cspace и т.д.
    # false → минимум топиков, меньше нагрузки на CPU
    debug: false

    # ── Условия завершения исследования ─────────────────────
    # Сколько раз подряд "нет фронтиров" или "нет пути" перед
    # тем как объявить карту полностью исследованной.
    # Увеличь если SLAM медленный и карта строится долго.
    # Уменьши если хочешь быстрее останавливаться.
    num_explore_fails_before_finish: 60

    # Минимальный размер карты (ширина * высота клеток) перед
    # стартом исследования. При запуске SLAM карта маленькая
    # и почти вся -1 — фронтиров нет. Ждём пока карта вырастет.
    min_map_cells: 300

    # ── Параметры поиска фронтиров ───────────────────────────
    # Минимальное количество клеток во фронтире.
    # Уменьши до 1-2 если карта маленькая и фронтиры не находятся.
    # Увеличь до 8-10 чтобы игнорировать шумовые пиксели карты.
    min_frontier_size: 3

    # Сколько лучших фронтиров (по размеру) проверять через A*.
    # Увеличь до 15-20 если пропускает хорошие фронтиры.
    # Уменьши если A* работает медленно (маломощный компьютер).
    max_frontiers_to_check: 8

    # ── Веса стоимости при выборе фронтира ───────────────────
    # cost = a_star_weight * a_star_cost + size_weight / frontier_size
    #
    # a_star_cost_weight: увеличь → предпочитать БЛИЖНИЕ фронтиры
    #                     уменьши → расстояние менее важно
    a_star_cost_weight: 10.0

    # frontier_size_cost_weight: увеличь → предпочитать БОЛЬШИЕ фронтиры
    #                             уменьши → размер менее важен
    frontier_size_cost_weight: 1.0

    # ── Частота цикла исследования ───────────────────────────
    # Гц. 2 Гц достаточно — BFS тяжёлая операция.
    # Увеличь до 5 если карта меняется быстро.
    exploration_rate: 2.0


pure_persuit:
  ros__parameters:

    # ── Режим отладки ───────────────────────────────────────
    debug: false

    # ── Pure Pursuit ─────────────────────────────────────────
    # Расстояние lookahead (м). Чем больше — тем плавнее путь,
    # но робот срезает углы. Чем меньше — точнее, но дёргается.
    # Рекомендуется: 0.3-0.5 для твоего робота с плохими моторами.
    lookahead_distance: 0.35

    # Расстояние между колёсами (м). Должно совпадать с URDF.
    wheel_base: 0.19

    # Максимальная линейная скорость (м/с).
    # Уменьши если моторы не успевают или робот нестабилен.
    max_drive_speed: 0.08

    # Максимальная угловая скорость (рад/с).
    # Уменьши до 0.6-0.8 чтобы оба мотора успевали отработать поворот.
    max_turn_speed: 0.8

    # Пропорциональный коэффициент угловой скорости.
    turn_speed_kp: 1.25

    # Допуск до цели (м). При достижении этого расстояния до
    # конечной точки пути робот останавливается.
    distance_tolerance: 0.1

    # ── Объезд препятствий ───────────────────────────────────
    # Сила отталкивания от стен. Увеличь если врезается,
    # уменьши если траектория слишком сильно искажается.
    obstacle_avoidance_gain: 0.3

    # Расстояние (м) при котором начинается замедление.
    obstacle_avoidance_max_slow_down_distance: 0.20

    # Расстояние (м) при котором замедление максимальное.
    obstacle_avoidance_min_slow_down_distance: 0.12

    # Минимальный коэффициент скорости при торможении у стены.
    # 0.25 = замедляется до 25% от max_drive_speed.
    obstacle_avoidance_min_slow_down_factor: 0.25

    # ── Поле зрения для объезда препятствий ─────────────────
    # Угол поля зрения (градусы). Стены в этом секторе учитываются.
    fov: 200

    # Радиус поля зрения (клеток карты).
    fov_distance: 25

    # Мёртвая зона спереди (градусы). Стены прямо перед роботом
    # игнорируются — иначе робот не едет вперёд вдоль стены.
    fov_deadzone: 80

    # Малое поле зрения для близких препятствий (градусы).
    small_fov: 300

    # Радиус малого поля зрения (клеток).
    small_fov_distance: 10